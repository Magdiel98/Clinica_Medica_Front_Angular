 <main>
    <h1>CADASTRO PACIENTE</h1>
    <form id="form" (ngSubmit)="enviarPaciente()">
        <div class="mb-3">
            <label for="name" class="form-label">NOME COMPLETO</label>
            <input type="text" [(ngModel)]="paciente.nome" id="name" name="name" class="form-control" placeholder="Maria Alves" required>
        </div>
        
        <div class="mb-3">
            <label for="cpf" class="form-label">CPF</label> 
            <input type="text" [(ngModel)]="paciente.cpf" id="cpf" name="cpf" class="form-control" placeholder="XXX.XXX.XXX-XX" required>
        </div>  

        <div class="mb-3">
            <label for="telefone" class="form-label">TELEFONE</label>
            <input type="tel" [(ngModel)]="paciente.telefone" id="telefone" name="telefone" class="form-control" placeholder="(XX)XXXXX-XXXX" required>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">EMAIL</label>
            <input type="email" [(ngModel)]="paciente.email" id="email" name="email" class="form-control" placeholder="mariaalves@gmail.com" required>
        </div>
        
        <button type="submit" id="enviar">ENVIAR</button>
    </form>
</main>
