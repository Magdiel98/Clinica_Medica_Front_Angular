<main>
    <h1>CORPO CLÍNICO</h1>
    <a id="cadastro" routerLink="/cadastromedico">Cadastro Médico</a>
    <div id="conjunto">
        @for(item of todoList; track $index){
            <div class="card">
                <p><strong>Nome:</strong> {{item.nomeMedico}}</p>
                <p><strong>Email:</strong> {{item.email}}</p>
                <p><strong>CRM:</strong> {{item.crm}}</p>
                <p><strong>Telefone</strong> {{item.telefones}}</p>
            </div>
        }
    </div>
</main>
